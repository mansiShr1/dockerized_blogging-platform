version: "3.9"

services:
  # ---------------------- #
  #      DATABASE          #
  # ---------------------- #
  db:
    image: mysql:8
    container_name: blogging-platform-db-1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root # change if needed
      MYSQL_DATABASE: blogging
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------- #
  #      BACKEND           #
  # ---------------------- #
  backend:
    build: ./backend
    container_name: blogging-platform-backend-1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: blogging
    ports:
      - "5000:5000"

  # ---------------------- #
  #      FRONTEND          #
  # ---------------------- #
  frontend:
    build: ./frontend
    container_name: blogging-platform-frontend-1
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:5000
    ports:
      - "3000:80"

# ---------------------- #
#      VOLUMES           #
# ---------------------- #
volumes:
  db_data:
